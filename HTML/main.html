<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediashare — Dashboard</title>
    <link rel="stylesheet" href="../styles/bulma/css/bulma.min.css">
    <link rel="stylesheet" href="../styles/mystyles.css">
</head>
<body class="dashboard-body">

    <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
    <nav class="navbar is-dark" role="navigation">
        <div class="navbar-brand">
            <span class="navbar-item has-text-weight-bold is-size-5">Mediashare</span>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <span id="nav-user" class="has-text-grey-light is-size-7 mr-3"></span>
                <button id="logout-btn" class="button is-small is-danger is-outlined">Logout</button>
            </div>
        </div>
    </nav>

    <!-- ── Channel tabs ─────────────────────────────────────────────────────── -->
    <div class="tabs-wrapper px-4 pt-3">
        <div class="tabs is-boxed" id="channel-tabs">
            <ul id="channel-tab-list">
                <!-- populated by JS -->
            </ul>
        </div>
    </div>

    <!-- ── Main content ─────────────────────────────────────────────────────── -->
    <div class="columns is-gapless dashboard-columns px-4 pb-4">

        <!-- Left: overlay preview -->
        <div class="column is-7 pr-3">
            <div class="box preview-box">
                <p class="heading mb-2">Live Preview</p>
                <iframe id="preview-frame"
                        class="preview-frame"
                        src="overlay.html?channel="
                        title="Overlay preview"
                    allow="autoplay; encrypted-media; fullscreen; picture-in-picture">
                </iframe>
            </div>
        </div>

        <!-- Right: queue -->
        <div class="column is-5">
            <div class="box queue-box">

                <!-- Now playing -->
                <p class="heading mb-2">Now Playing</p>
                <div id="now-playing-info" class="mb-4">
                    <span class="has-text-grey">Nothing playing.</span>
                </div>

                <hr class="queue-divider">

                <!-- Play mode selector -->
                <div class="level mb-3">
                    <div class="level-left">
                        <p class="heading level-item mb-0">Play Mode</p>
                    </div>
                    <div class="level-right">
                        <div class="level-item">
                            <div class="select is-small is-dark">
                                <select id="mode-select">
                                    <option value="requests">Viewer Requests only</option>
                                    <option value="mylist">My List only</option>
                                    <option value="switch">Alternate (Viewer → Mine)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Queue-type tab switcher -->
                <div class="tabs is-small is-boxed mb-3" id="queue-type-tabs">
                    <ul>
                        <li class="is-active" data-tab="requests"><a>Viewer Requests</a></li>
                        <li data-tab="mylist"><a>My List</a></li>
                    </ul>
                </div>

                <!-- ── Viewer Requests panel ── -->
                <div id="panel-requests">
                    <div class="level mb-2">
                        <div class="level-left">
                            <p class="heading level-item">
                                Up Next&nbsp;<span id="queue-count" class="tag is-dark">0</span>
                            </p>
                        </div>
                    </div>

                    <div id="queue-empty" class="has-text-centered has-text-grey py-4">
                        Queue is empty.
                    </div>

                    <table class="table is-fullwidth is-hoverable is-narrow"
                           id="queue-table" style="display:none">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Thumb</th>
                                <th>Platform</th>
                                <th>Title</th>
                                <th>By</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="queue-tbody"></tbody>
                    </table>
                </div>

                <!-- ── My List panel ── -->
                <div id="panel-mylist" style="display:none">
                    <div class="field has-addons mb-1">
                        <div class="control is-expanded">
                            <input id="mylist-url-input" class="input is-small" type="url"
                                   placeholder="Paste YouTube video or playlist URL (youtube.com/playlist?list=…)">
                        </div>
                        <div class="control">
                            <button id="mylist-add-btn" class="button is-small is-link">Add</button>
                        </div>
                    </div>
                    <p id="mylist-add-status" class="is-size-7 mb-3"></p>

                    <div class="level mb-2">
                        <div class="level-left">
                            <p class="heading level-item">
                                My Songs&nbsp;<span id="mylist-count" class="tag is-dark">0</span>
                            </p>
                        </div>
                    </div>

                    <div id="mylist-empty" class="has-text-centered has-text-grey py-4">
                        No songs added yet.
                    </div>

                    <table class="table is-fullwidth is-hoverable is-narrow"
                           id="mylist-table" style="display:none">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Thumb</th>
                                <th>Platform</th>
                                <th>Title</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="mylist-tbody"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <!-- Socket.io client -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="../scrs/frontend/main.js"></script>
</body>
</html>
