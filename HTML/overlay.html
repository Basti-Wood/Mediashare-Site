<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediashare Overlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        #player-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        /* YouTube div / iframe fills the entire container */
        #yt-player {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        /* The YouTube IFrame API injects an <iframe> in here — force it to fill. */
        #yt-player iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
        }

        /* Spotify embed */
        #spotify-player {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            border: none;
        }

        /* Media controls bar — overlays on top of the video, doesn't shrink it */
        #player-controls {
            display: none;
            flex-direction: column;
            gap: 5px;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 12px 10px;
            background: rgba(0, 0, 0, 0.72);
            z-index: 20;
        }

        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #seek-bar {
            flex: 1;
            cursor: pointer;
            accent-color: #e05;
        }

        #seek-bar:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        #volume-bar {
            width: 90px;
            cursor: pointer;
            accent-color: #e05;
        }

        #time-display {
            color: #fff;
            font-size: 0.72rem;
            white-space: nowrap;
            font-family: 'Segoe UI', sans-serif;
            min-width: 90px;
            text-align: right;
        }

        .ctrl-icon {
            font-size: 0.9rem;
            line-height: 1;
        }

        #idle-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #555;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div id="player-container">
        <div id="idle-screen">Waiting for media…</div>
        <!-- YouTube player target -->
        <div id="yt-player" style="display:none"></div>
        <!-- Spotify embed target -->
        <iframe id="spotify-player"
                style="display:none"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"
                height="152">
        </iframe>

        <!-- Media controls (shown when ?controls=1) -->
        <div id="player-controls">
            <div class="ctrl-row">
                <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
                <span id="time-display">0:00 / 0:00</span>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-icon">&#128266;</span>
                <input type="range" id="volume-bar" min="0" max="100" value="100">
            </div>
        </div>
    </div>

    <!-- Socket.io client -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="../scrs/frontend/overlay.js?v=bg-1"></script>
</body>
</html>
